<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista słówek – Praca</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --card: #1a1a1a;
    --card2: #222;
    --accent: #f5c842;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --muted: #888;
    --border: #2e2e2e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 60px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.4;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
    width: 100%;
    max-width: 700px;
  }

  .label {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 10px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 800;
    line-height: 1;
    color: var(--text);
  }

  h1 span { color: var(--accent); }

  .subtitle {
    color: var(--muted);
    margin-top: 10px;
    font-size: 14px;
    margin-bottom: 14px;
  }

  .nav-link {
    display: inline-block;
    font-size: 13px;
    color: var(--accent);
    text-decoration: none;
    border: 1px solid var(--accent);
    border-radius: 8px;
    padding: 6px 16px;
    transition: background 0.2s, color 0.2s;
  }
  .nav-link:hover { background: var(--accent); color: #000; }

  .controls {
    width: 100%;
    max-width: 700px;
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-input {
    flex: 1;
    min-width: 200px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }

  .count-badge {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    padding: 6px 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
  }

  .list-wrap {
    width: 100%;
    max-width: 700px;
  }

  .letter-group {
    margin-bottom: 8px;
  }

  .letter-heading {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent2);
    padding: 10px 20px 6px;
  }

  .word-table {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  .word-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
    padding: 11px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    transition: background 0.15s;
  }

  .word-row:last-child { border-bottom: none; }
  .word-row:hover { background: var(--card2); }

  .word-pl { color: var(--muted); }
  .word-en { color: var(--text); font-weight: 500; }

  .empty-msg {
    text-align: center;
    color: var(--muted);
    padding: 40px;
    font-size: 14px;
  }

  @media (max-width: 480px) {
    .word-row { grid-template-columns: 1fr; gap: 2px; padding: 10px 16px; }
    .word-en { color: var(--accent); }
  }
</style>
</head>
<body>

<header>
  <div class="label">Angielski · Rozdział 4 · Część 2</div>
  <h1>Lista <span>słówek</span></h1>
  <p class="subtitle">Pełna lista wyrażeń z rozdziału — posortowana A–Z po angielskim</p>
  <a href="slowka_praca_quiz.html" class="nav-link">🎯 Przejdź do quizu →</a>
</header>

<div class="controls">
  <input class="search-input" type="text" id="search" placeholder="Szukaj po polsku lub angielsku..." oninput="filterWords()" autocomplete="off" spellcheck="false" />
  <div class="count-badge" id="count-badge">— słówek</div>

<div class="list-wrap" id="list-wrap"></div>

  { pl: "pozostać w zawodzie, kontynuować pracę", en: "stay on" },
  { pl: "praca tymczasowa", en: "temporary position" },
];

const sorted = [...ALL_WORDS].sort((a, b) => a.en.localeCompare(b.en));
let filtered = sorted;

function filterWords() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  filtered = q
    ? sorted.filter(w => w.en.toLowerCase().includes(q) || w.pl.toLowerCase().includes(q))
    : sorted;
  render();
}

function render() {
  const wrap = document.getElementById('list-wrap');
  document.getElementById('count-badge').textContent = `${filtered.length} słówek`;

  if (filtered.length === 0) {
    wrap.innerHTML = '<div class="empty-msg">Brak wyników 🤷</div>';
    return;
  }

  const groups = {};
  filtered.forEach(w => {
    const letter = w.en[0].toUpperCase();
    if (!groups[letter]) groups[letter] = [];
    groups[letter].push(w);
  });

  wrap.innerHTML = Object.keys(groups).sort().map(letter => `
    <div class="letter-group">
      <div class="letter-heading">${letter}</div>
      <div class="word-table">
        ${groups[letter].map(w => `
          <div class="word-row">
            <span class="word-pl">${w.pl}</span>
            <span class="word-en">${w.en}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

render();
</script>
