<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz | Angielski</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f0f0f;--card:#1a1a1a;--card2:#222;--accent:#f5c842;--accent2:#ff6b35;--green:#4ade80;--red:#f87171;--text:#f0f0f0;--muted:#888;--border:#2e2e2e}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:32px 16px 60px}
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:999;opacity:0.4}
  header{text-align:center;margin-bottom:40px;width:100%;max-width:600px}
  .label{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--accent);font-weight:500;margin-bottom:10px}
  h1{font-family:'Syne',sans-serif;font-size:clamp(2rem,6vw,3.5rem);font-weight:800;line-height:1}
  h1 span{color:var(--accent)}
  .subtitle{color:var(--muted);margin-top:10px;font-size:14px;margin-bottom:14px}
  .nav{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .nav a{font-size:13px;color:var(--muted);text-decoration:none;border:1px solid var(--border);border-radius:8px;padding:6px 14px;transition:all .2s}
  .nav a:hover,.nav a.active{border-color:var(--accent);color:var(--accent);background:rgba(245,200,66,.06)}
  #screen-start,#screen-quiz,#screen-result{width:100%;max-width:600px;display:none}
  .active{display:block!important}
  .start-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:36px;text-align:center}
  .start-card p{color:var(--muted);line-height:1.7;margin-bottom:28px}
  .mode-toggle{display:flex;gap:10px;justify-content:center;margin-bottom:28px;flex-wrap:wrap}
  .mode-btn{background:var(--card2);border:1px solid var(--border);color:var(--muted);border-radius:10px;padding:10px 20px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;transition:all .2s}
  .mode-btn.selected{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600}
  .btn{display:inline-block;background:var(--accent);color:#000;font-family:'Syne',sans-serif;font-weight:700;font-size:15px;padding:14px 36px;border-radius:12px;border:none;cursor:pointer;transition:transform .15s,opacity .15s;text-decoration:none}
  .btn:hover{transform:translateY(-2px);opacity:.92}
  .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:14px}
  .btn-ghost:hover{border-color:var(--text);color:var(--text);opacity:1}
  .progress-bar-wrap{background:var(--card);border-radius:999px;height:6px;margin-bottom:28px;overflow:hidden}
  .progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:999px;transition:width .4s ease}
  .quiz-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:24px;letter-spacing:1px;text-transform:uppercase}
  .question-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:36px 32px;margin-bottom:20px}
  .question-tag{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--accent2);margin-bottom:14px;font-weight:500}
  .question-text{font-family:'Syne',sans-serif;font-size:clamp(1.3rem,4vw,2rem);font-weight:700;line-height:1.2;color:var(--text);margin-bottom:28px}
  .answer-input{width:100%;background:#111;border:2px solid var(--border);border-radius:12px;padding:16px 20px;font-family:'DM Sans',sans-serif;font-size:16px;color:var(--text);outline:none;transition:border-color .2s}
  .answer-input:focus{border-color:var(--accent)}
  .answer-input.correct{border-color:var(--green);background:rgba(74,222,128,.05)}
  .answer-input.wrong{border-color:var(--red);background:rgba(248,113,113,.05)}
  .feedback{margin-top:14px;padding:14px 18px;border-radius:10px;font-size:14px;line-height:1.6;display:none}
  .feedback.show{display:block}
  .feedback.correct{background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);color:var(--green)}
  .feedback.wrong{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);color:var(--red)}
  .quiz-actions{display:flex;gap:12px;flex-wrap:wrap}
  .result-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:40px 36px;text-align:center;margin-bottom:24px}
  .score-display{font-family:'Syne',sans-serif;font-size:clamp(3.5rem,12vw,6rem);font-weight:800;line-height:1;margin-bottom:8px}
  .score-label{color:var(--muted);font-size:14px;margin-bottom:24px}
  .score-message{font-size:18px;font-weight:500}
  .result-list{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:24px}
  .result-list-header{padding:14px 20px;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);background:var(--card2)}
  .result-item{display:grid;grid-template-columns:28px 1fr 1fr;gap:12px;align-items:center;padding:12px 20px;border-bottom:1px solid var(--border);font-size:13px}
  .result-item:last-child{border-bottom:none}
  .result-item .polish{color:var(--muted)}
  .result-item .english{font-weight:500}
  .result-item.ok .english{color:var(--green)}
  .result-item.fail .english{color:var(--red)}
  .result-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  @keyframes pop{0%{transform:scale(.85);opacity:0}70%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
  .pop{animation:pop .4s ease forwards}
  @media(max-width:480px){.question-card{padding:24px 20px}.result-item{grid-template-columns:24px 1fr}.result-item .english{grid-column:2}}
</style>
</head>
<body>
<header>
  <div class="label" id="chapter-label">Quiz</div>
  <h1>Quiz</h1>
  <p class="subtitle">Wpisz angielski odpowiednik do polskiego tłumaczenia</p>
  <nav class="nav">
    <a href="index.html">← Materiał</a>
    <a href="#" id="lista-link">📖 Lista</a>
    <a href="#" class="active">🎯 Quiz</a>
  </nav>
</header>

<div id="screen-start" class="active">
  <div class="start-card">
    <p>Zostanie wylosowanych <strong>15 słówek</strong> z tego rozdziału.</p>
    <div style="margin-bottom:16px;font-size:13px;color:var(--muted)">Tryb sprawdzania:</div>
    <div class="mode-toggle">
      <button class="mode-btn selected" onclick="selectMode(this,'loose')">Toleruje literówki</button>
      <button class="mode-btn" onclick="selectMode(this,'exact')">Dokładne dopasowanie</button>
    </div>
    <button class="btn" onclick="startQuiz()">Zacznij quiz 🚀</button>
  </div>
</div>

<div id="screen-quiz">
  <div class="quiz-meta">
    <span id="q-counter">Pytanie 1 / 15</span>
    <span id="q-score-live">✓ 0 &nbsp;✗ 0</span>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
  <div class="question-card pop" id="q-card">
    <div class="question-tag" id="q-category">—</div>
    <div class="question-text" id="q-polish">—</div>
    <input class="answer-input" id="answer-input" type="text" placeholder="Wpisz po angielsku..." autocomplete="off" autocorrect="off" spellcheck="false" onkeydown="handleKey(event)" />
    <div class="feedback" id="feedback"></div>
  </div>
  <div class="quiz-actions">
    <button class="btn" id="btn-check" onclick="checkAnswer()">Sprawdź</button>
    <button class="btn btn-ghost" id="btn-next" onclick="nextQuestion()" style="display:none">Następne →</button>
    <button class="btn btn-ghost" id="btn-skip" onclick="skipQuestion()">Pomiń</button>
  </div>
</div>

<div id="screen-result">
  <div class="result-card pop">
    <div class="score-display" id="score-num">0/15</div>
    <div class="score-label">poprawnych odpowiedzi</div>
    <div class="score-message" id="score-msg"></div>
  </div>
  <div class="result-list">
    <div class="result-list-header">Podsumowanie odpowiedzi</div>
    <div id="result-items"></div>
  </div>
  <div class="result-actions">
    <button class="btn" onclick="startQuiz()">Nowy quiz 🔀</button>
    <button class="btn btn-ghost" onclick="retryWrong()" id="btn-retry-wrong">Powtórz błędne</button>
  </div>
</div>

<footer style="margin-top:48px;text-align:center;font-size:12px;color:var(--muted)">
  <a href="https://github.com/62koen/angielski" target="_blank" style="color:var(--accent);text-decoration:none">GitHub</a>
</footer>

<script>
const plik = new URLSearchParams(location.search).get('plik');
let chapterWords = [], currentMode = 'loose';
let quizWords = [], currentIndex = 0, correctCount = 0, wrongCount = 0;
let answered = false, results = [], wrongPool = [], wrongOnly = false;

async function init() {
  if (!plik) { location.href = 'index.html'; return; }
  try {
    const ch = await fetch(`rozdzialy/${plik}`).then(r => r.json());
    chapterWords = ch.words;
    document.getElementById('chapter-label').textContent = ch.name;
    document.getElementById('lista-link').href = `lista.html?plik=${encodeURIComponent(plik)}`;
    document.title = `Quiz – ${ch.name}`;
  } catch { location.href = 'index.html'; }
}

function selectMode(btn, mode) {
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected'); currentMode = mode;
}
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function startQuiz() {
  const pool = wrongOnly && wrongPool.length ? wrongPool : chapterWords;
  quizWords = shuffle(pool).slice(0, Math.min(15, pool.length));
  currentIndex = 0; correctCount = 0; wrongCount = 0; results = []; wrongOnly = false;
  showScreen('quiz'); loadQuestion();
}
function retryWrong() {
  wrongPool = results.filter(r => !r.ok).map(r => r.word);
  if (!wrongPool.length) return;
  wrongOnly = true; startQuiz();
}
function showScreen(n) {
  ['start','quiz','result'].forEach(s => document.getElementById('screen-'+s).classList.remove('active'));
  document.getElementById('screen-'+n).classList.add('active');
}
function loadQuestion() {
  answered = false;
  const w = quizWords[currentIndex];
  document.getElementById('q-counter').textContent = `Pytanie ${currentIndex+1} / ${quizWords.length}`;
  document.getElementById('q-score-live').innerHTML = `✓ ${correctCount} &nbsp;✗ ${wrongCount}`;
  document.getElementById('progress-fill').style.width = `${(currentIndex/quizWords.length)*100}%`;
  document.getElementById('q-category').textContent = document.getElementById('chapter-label').textContent;
  document.getElementById('q-polish').textContent = w.pl;
  const input = document.getElementById('answer-input');
  input.value = ''; input.className = 'answer-input'; input.disabled = false;
  const fb = document.getElementById('feedback');
  fb.className = 'feedback'; fb.textContent = '';
  document.getElementById('btn-check').style.display = 'inline-block';
  document.getElementById('btn-next').style.display = 'none';
  document.getElementById('btn-skip').style.display = 'inline-block';
  const card = document.getElementById('q-card');
  card.classList.remove('pop'); void card.offsetWidth; card.classList.add('pop');
  setTimeout(() => input.focus(), 50);
}
function lev(a, b) {
  const dp = Array.from({length:a.length+1},(_,i)=>Array.from({length:b.length+1},(_,j)=>i===0?j:j===0?i:0));
  for (let i=1;i<=a.length;i++) for (let j=1;j<=b.length;j++) dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[a.length][b.length];
}
function isCorrect(u, c) {
  u = u.toLowerCase().trim(); c = c.toLowerCase().trim();
  if (u === c) return true;
  return currentMode === 'loose' ? lev(u,c) <= Math.max(1, Math.floor(c.length*.2)) : false;
}
function checkAnswer() {
  if (answered) return;
  const w = quizWords[currentIndex];
  const ua = document.getElementById('answer-input').value.trim();
  if (!ua) return;
  answered = true;
  const ok = isCorrect(ua, w.en);
  const input = document.getElementById('answer-input'); input.disabled = true;
  const fb = document.getElementById('feedback');
  if (ok) { correctCount++; input.classList.add('correct'); fb.className='feedback correct show'; fb.innerHTML=`✓ Brawo! <strong>${w.en}</strong>`; }
  else { wrongCount++; input.classList.add('wrong'); fb.className='feedback wrong show'; fb.innerHTML=`✗ Niestety. Poprawna odpowiedź: <strong>${w.en}</strong>`; }
  results.push({word:w, ok});
  document.getElementById('q-score-live').innerHTML = `✓ ${correctCount} &nbsp;✗ ${wrongCount}`;
  document.getElementById('btn-check').style.display = 'none';
  document.getElementById('btn-skip').style.display = 'none';
  if (currentIndex < quizWords.length-1) document.getElementById('btn-next').style.display = 'inline-block';
  else setTimeout(showResult, 1200);
}
function skipQuestion() {
  if (answered) return;
  answered = true;
  const w = quizWords[currentIndex]; wrongCount++;
  results.push({word:w, ok:false});
  const input = document.getElementById('answer-input'); input.disabled = true; input.classList.add('wrong');
  const fb = document.getElementById('feedback');
  fb.className='feedback wrong show'; fb.innerHTML=`✗ Pominięto. Poprawna odpowiedź: <strong>${w.en}</strong>`;
  document.getElementById('q-score-live').innerHTML = `✓ ${correctCount} &nbsp;✗ ${wrongCount}`;
  document.getElementById('btn-check').style.display = 'none';
  document.getElementById('btn-skip').style.display = 'none';
  if (currentIndex < quizWords.length-1) document.getElementById('btn-next').style.display = 'inline-block';
  else setTimeout(showResult, 1200);
}
function nextQuestion() { currentIndex++; loadQuestion(); }
function handleKey(e) { if(e.key==='Enter'){ if(!answered) checkAnswer(); else if(currentIndex<quizWords.length-1) nextQuestion(); } }
function showResult() {
  showScreen('result');
  const pct = Math.round((correctCount/quizWords.length)*100);
  const el = document.getElementById('score-num');
  el.textContent = `${correctCount}/${quizWords.length}`;
  el.style.color = pct===100?'var(--green)':pct>=60?'var(--accent)':'var(--red)';
  const msgs = ['Jeszcze idzie ciężko... 😅','Trzeba poćwiczyć 📚','Nieźle! 😊','Świetny wynik! 💪','Perfekcyjnie! 🏆'];
  document.getElementById('score-msg').textContent = msgs[Math.min(4,Math.floor(pct/25))];
  const c = document.getElementById('result-items'); c.innerHTML = '';
  results.forEach(r => {
    const d = document.createElement('div');
    d.className = `result-item ${r.ok?'ok':'fail'}`;
    d.innerHTML = `<span>${r.ok?'✓':'✗'}</span><span class="polish">${r.word.pl}</span><span class="english">${r.word.en}</span>`;
    c.appendChild(d);
  });
  const wc = results.filter(r=>!r.ok).length;
  const rb = document.getElementById('btn-retry-wrong');
  rb.style.display = wc > 0 ? 'inline-block' : 'none';
  rb.textContent = `Powtórz błędne (${wc}) 🔁`;
}
init();
</script>
</body>
</html>
